# Tavily Search Configuration

tavily:
  # API Key
  api_key_env: "TAVILY_API_KEY"

  # Search settings
  max_results: 5

  # Search depth: basic, advanced
  search_depth: basic

  # Include answer
  include_answer: true

  # Include raw content
  include_raw_content: false

  # Include domains
  include_domains: []

  # Exclude domains
  exclude_domains: []

  # Time range (hours, days, months, years)
  # Example: "24h", "7d", "1m", "1y"
  time_range: null

  # Topic: general, news
  topic: general
