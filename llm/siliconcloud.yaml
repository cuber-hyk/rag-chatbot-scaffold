# SiliconCloud LLM Configuration

siliconcloud:
  # API Base URL
  base_url: "https://api.siliconflow.cn/v1"

  # Environment variable for API key
  api_key_env: "SILICONCLOUD_API_KEY"

  # Model presets
  presets:
    default_chat:
      model_id: "Qwen/Qwen2.5-72B-Instruct"
      type: "chat"
      temperature: 0.7
      max_tokens: 2048
      timeout: 60

    fast_chat:
      model_id: "Qwen/Qwen2.5-7B-Instruct"
      type: "chat"
      temperature: 0.7
      max_tokens: 1024
      timeout: 30

    default_embedding:
      model_id: "BAAI/bge-large-en-v1.5"
      type: "embedding"
      embedding_ctx_length: 8191

    chinese_embedding:
      model_id: "BAAI/bge-large-zh-v1.5"
      type: "embedding"
      embedding_ctx_length: 8191

  # Fallback models
  fallback_models:
    - "Qwen/Qwen2.5-7B-Instruct"
    - "THUDM/glm-4-9b-chat"

  # Streaming support
  streaming: true
