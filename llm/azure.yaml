# Azure OpenAI LLM Configuration

azure:
  # API Base URL
  base_url: "https://{your-resource}.openai.azure.com"

  # Environment variable for API key
  api_key_env: "AZURE_OPENAI_API_KEY"

  # Environment variable for deployment name
  deployment_env: "AZURE_OPENAI_DEPLOYMENT"

  # Model presets
  presets:
    default_chat:
      model_id: "gpt-4o"
      type: "chat"
      temperature: 0.7
      max_tokens: 2048
      timeout: 60

    fast_chat:
      model_id: "gpt-4o-mini"
      type: "chat"
      temperature: 0.7
      max_tokens: 1024
      timeout: 30

    default_embedding:
      model_id: "text-embedding-3-small"
      type: "embedding"
      embedding_ctx_length: 8191

  # Fallback models
  fallback_models:
    - "gpt-4o-mini"
    - "gpt-35-turbo"

  # Streaming support
  streaming: true
