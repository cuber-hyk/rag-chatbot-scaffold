# Pinecone Vector Database Configuration

pinecone:
  # API Key
  api_key_env: "PINECONE_API_KEY"

  # Environment
  # Production: "us-east-1-aws", "gcp-starter", etc.
  environment_env: "PINECONE_ENVIRONMENT"

  # Project ID (for Serverless)
  project_id_env: "PINECONE_PROJECT_ID"

  # Index settings
  index:
    # Dimension (depends on embedding model)
    dimension: 1536

    # Metric: cosine, euclidean, dotproduct
    metric: cosine

    # Pod type (for Pod-based indexes)
    # pod_type: p1.x1

    # Cloud (for Serverless)
    cloud: aws

    # Region (for Serverless)
    region: us-east-1

  # Connection settings
  timeout: 60
