# Qdrant Vector Database Configuration

qdrant:
  # Connection URL
  # Local: http://localhost:6333
  # Cloud: https://your-cluster.qdrant.io
  url_env: "QDRANT_URL"

  # API Key (for Qdrant Cloud)
  api_key_env: "QDRANT_API_KEY"

  # Connection settings
  timeout: 60
  prefer_grpc: false

  # Collection settings
  collection:
    # Vector dimension (depends on embedding model)
    vector_size: 1536

    # Distance metric: cosine, euclid, dot
    distance: cosine

    # HNSW index settings
    hnsw_config:
      m: 16
      ef_construct: 100

  # Optimization settings
  optimizer_config:
    deleted_threshold: 0.2
    vacuum_min_vector_number: 1000
    default_segment_number: 2
