# Weaviate Vector Database Configuration

weaviate:
  # Connection URL
  # Local: http://localhost:8080
  # Cloud: https://your-cluster.weaviate.cloud
  url_env: "WEAVIATE_URL"

  # API Key (for Weaviate Cloud)
  api_key_env: "WEAVIATE_API_KEY"

  # Connection settings
  timeout: 60
  additional_headers: {}

  # Class (collection) settings
  class:
    vectorizer: text2vec-openai
    module_config:
      text2vec-openai:
        model: text-embedding-3-small
        type: text
        vectorizeClassName: false

  # Index settings
  index_config:
    skip: false
    dynamic: false

  # Replication settings
  replication_config:
    factor: 1
